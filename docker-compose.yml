version: '3.8'

services:
  db:
    image: postgres:16
    container_name: db_capacitaciones
    restart: always
    environment:
      POSTGRES_USER: admin_db
      POSTGRES_PASSWORD: password_segura_123
      POSTGRES_DB: gobierno_personas
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db_init:/docker-entrypoint-initdb.d

  api:
    build: ./backend
    container_name: api_capacitaciones
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: frontend_capacitaciones
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html

volumes:
  pg_data: