<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Capacitaciones</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        .upload-box { border: 2px dashed #ccc; padding: 40px; margin: 20px auto; width: 50%; }
    </style>
</head>
<body>
    <h1>Carga de Datos de Capacitación</h1>
    <div class="upload-box">
        <input type="file" id="fileInput">
        <button onclick="uploadFile()">Subir archivo</button>
    </div>
    <div id="status"></div>

    <script>
        function uploadFile() {
            const file = document.getElementById('fileInput').files[0];
            const formData = new FormData();
            formData.append('file', file);
            
            fetch('http://localhost:8000/upload', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => document.getElementById('status').innerText = "Estado: " + data.message);
        }
    </script>
</body>
</html>
